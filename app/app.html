<!DOCTYPE html>
<html lang="en">

<head>
    <title>Configurator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/app-styles.css">
</head>

<body>
    <div id="ui-root">

        <!-- buttons -->
        <div class="panel info">
            <div class="info-row">
                <button id="btnBack" class="icon-btn" title="Back" aria-label="Back">
                    <i data-lucide="arrow-left"></i>
                </button>

                <button id="btnToggleToolbar" class="icon-btn" title="Toggle tools" aria-label="Toggle tools">
                    <i data-lucide="move-3d"></i>
                </button>

                <button id="btnToggleParams" class="icon-btn" title="Toggle parameters" aria-label="Toggle parameters">
                    <i data-lucide="sliders-horizontal"></i>
                </button>

                <button id="btnToggleChat" class="icon-btn" title="Toggle chat" aria-label="Toggle chat">
                    <i data-lucide="message-square"></i>
                </button>

                <div id="loadingSpinner" class="loading-spinner" aria-label="Loading" data-pct="0"></div>


            </div>

        </div>

        <!-- tools -->
        <div class="panel toolbar">
            <button id="btnMove" class="active">Move</button>
            <button id="btnRotate">Rotate</button>
            <button id="btnScale">Scale</button>
        </div>

        <!-- chat -->
        <div class="panel chat" style="right: 20px; bottom: 20px; pointer-events: auto; width: 360px;">

            <div id="chatMessages" style="height: 180px; overflow-y: auto; padding: 8px; background: rgba(255,255,255,0.65);
           border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; margin-bottom: 8px;">
            </div>

            <div style="display:flex; gap:8px; align-items:flex-end;">
                <textarea id="chatInput" placeholder="Describe what you want… (Enter to send, Shift+Enter for newline)"
                    rows="5"
                    style="flex:1; resize:none; padding:8px; border-radius:10px; border:1px solid rgba(0,0,0,0.2);"></textarea>
                <button id="chatSend"
                    style="padding:8px 12px; border-radius:10px; border:1px solid rgba(0,0,0,0.2); cursor:pointer;">
                    Send
                </button>
            </div>
        </div>


        <!-- sliders -->
        <div class="panel sliders" style="top: 120px; left: 20px; pointer-events: auto; width: 260px;">
            <div style="font-weight: 600; margin-bottom: 8px; color:black">Parameters</div>

            <!-- Height -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sHeight" style="color:black">Height</label>
                    <span id="vHeight" style="color:black">0.42</span>
                </div>
                <input id="sHeight" type="range" min="0.03" max="2" step="0.01" value="0.42" style="width:100%;">
            </div>

            <!-- Width -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sWidth" style="color:black">Width</label>
                    <span id="vWidth" style="color:black">0.35</span>
                </div>
                <input id="sWidth" type="range" min="0.03" max="2" step="0.01" value="0.35" style="width:100%;">
            </div>

            <!-- Length -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sLength" style="color:black">Length</label>
                    <span id="vLength" style="color:black">0.56</span>
                </div>
                <input id="sLength" type="range" min="0.03" max="2" step="0.01" value="0.56" style="width:100%;">
            </div>

      <!-- Smoothness -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sSmoothness" style="color:black">Smoothness</label>
                    <span id="vSmoothness" style="color:black">0.36</span>
                </div>
                <input id="sSmoothness" type="range" min="0.01" max="1" step="0.01" value="0.36" style="width:100%;">
            </div>


      <!-- Expected top surface of the lamp -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sExpected top surface" style="color:black">Expected top surface</label>
                    <span id="vExpected top surface" style="color:black">0.7</span>
                </div>
                <input id="sExpected top surface" type="range" min="0.03" max="3" step="0.01" value="0.7" style="width:100%;">
            </div>

      <!-- Control the expansion and contraction of the form -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sContraction of the form" style="color:black">Contraction of the form</label>
                    <span id="vContraction of the form" style="color:black">1.54</span>
                </div>
                <input id="sContraction of the form" type="range" min="0.25" max="3" step="0.01" value="1.54" style="width:100%;">
            </div>

      <!-- Control the position of body expansion and contraction-->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sPosition of Contraction" style="color:black">Position of Contraction</label>
                    <span id="vPosition of Contraction" style="color:black">4.1</span>
                </div>
                <input id="sPosition of Contraction" type="range" min="1.05" max="10" step="0.01" value="4.1" style="width:100%;">
            </div>`
            thickness
      <!-- thickness-->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sthickness" style="color:black">Thickness</label>
                    <span id="vThickness" style="color:black">0.031</span>
                </div>
                <input id="sthickness" type="range" min="0.002" max="1" step="0.001" value="0.031" style="width:100%;">
            </div>`








        </div>


    </div>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
  }
}
</script>
    <script type="module" src="./app.js"></script>
</body>

</html>
